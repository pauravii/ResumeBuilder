
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Template - ResumeGo</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f6d365, #fda085);
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 1100px;
  background: #fff;
  border-radius: 15px;
  padding: 40px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 35px;
  color: #333;
  font-size: 26px;
}

.templates {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.template-card {
  width: 230px;
  border: 2px solid #ddd;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  background: #fafafa;
  text-align: center;
  padding: 10px;
  transition: 0.3s ease;
}

.template-card img {
  width: 100%;
  height: 300px;
  object-fit: contain;
  background: white;
}

.template-card p {
  margin: 12px 0 0;
  font-weight: 600;
}

.template-card.selected {
  border-color: #4CAF50;
  box-shadow: 0 0 18px rgba(76,175,80,0.6);
  transform: scale(1.04);
}

.template-card:hover {
  border-color: #4CAF50;
  transform: scale(1.05);
}

button {
  display: block;
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  font-size: 17px;
  background: linear-gradient(90deg, #43cea2, #185a9d);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: linear-gradient(90deg, #185a9d, #43cea2);
}
</style>
</head>

<body>

<div class="container">
  <h2>Select Your Resume Template</h2>

  <div class="templates">

    <div class="template-card selected" data-template="1">
      <img src="{{ url_for('static', filename='images/template1.jpg') }}">
      <p>Template 1</p>
    </div>

    <div class="template-card" data-template="2">
      <img src="{{ url_for('static', filename='images/template2.jpg') }}">
      <p>Template 2</p>
    </div>

    <div class="template-card" data-template="3">
      <img src="{{ url_for('static', filename='images/template3.jpg') }}">
      <p>Template 3</p>
    </div>

    <div class="template-card" data-template="4">
      <img src="{{ url_for('static', filename='images/template4.jpg') }}">
      <p>Template 4</p>
    </div>

  </div>

  <!-- Use Template Button -->
  <button id="chooseBtn">Use This Template</button>

  <!-- 🔥 NEW: Edit Resume Button -->
  <button onclick="goBackToEdit()">Edit Resume</button>

</div>

<script>
let selectedTemplate = '1';
const templates = document.querySelectorAll('.template-card');

templates.forEach(card => {
  card.addEventListener('click', () => {
    templates.forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedTemplate = card.dataset.template;
  });
});

document.getElementById('chooseBtn').addEventListener('click', () => {
  window.location.href = `/template${selectedTemplate}`;
});

// 🔥 IMPORTANT FUNCTION
function goBackToEdit(){
  localStorage.setItem('fromTemplates', "true");
  window.location.href = "/info";
}
</script>

</body>
</html>
